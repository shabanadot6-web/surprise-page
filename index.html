<!DOCTYPE html>
<html>
<head>

<title>Surprise 💖</title>

<style>

body{
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:300px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

#page2{
display:none;
}

/* popup design */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

</style>

</head>

<body>

<div class="card">

<!-- Page 1 -->

<div id="page1">
<h1>Hey Aswath ❤️</h1>
<p>I have something special for you</p>
<button onclick="nextPage()">Click Here</button>
</div>

<!-- Page 2 -->

<div id="page2">
<h1>Wait... 👀</h1>
<p>Are you ready for the surprise?</p>
<button onclick="showSurprise()">Reveal Surprise 🎁</button>
</div>

</div>

<!-- Popup Surprise -->

<div id="popup" class="popup">
<div class="popup-content">
<h2>🎉 Surprise! 🎉</h2>
<p>You make the world brighter just by being in it ❤️</p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

function nextPage(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
}

function showSurprise(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
